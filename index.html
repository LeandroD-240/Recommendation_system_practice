<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wren & Co. — Curated Home Goods</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #01386A;
    --mauve:  #A188A6;
    --sage:   #BEEF9E;
    --navy10: #01386A1A;
    --navy20: #01386A33;
    --cream:  #F8F5F0;
    --white:  #FFFFFF;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 64px;
    background: var(--cream);
    border-bottom: 1px solid var(--navy20);
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    color: var(--navy); text-decoration: none; letter-spacing: .02em;
  }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a {
    font-size: 13px; color: var(--navy); text-decoration: none;
    letter-spacing: .04em; opacity: .65; transition: opacity .2s;
  }
  .nav-links a:hover { opacity: 1; }
  .nav-cart {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--navy); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; border: none;
    transition: background .2s;
  }
  .nav-cart:hover { background: var(--mauve); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; padding: 80px 24px 60px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 20% 65%, rgba(161,136,166,.15) 0%, transparent 70%),
      radial-gradient(ellipse 45% 40% at 80% 30%, rgba(190,239,158,.2) 0%, transparent 70%),
      radial-gradient(ellipse 55% 55% at 50% 85%, rgba(1,56,106,.06) 0%, transparent 65%);
  }
  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid var(--navy20); pointer-events: none;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .ring-1 { width: 520px; height: 520px; top: -130px; right: -110px; }
  .ring-2 { width: 310px; height: 310px; bottom: 50px; left: -90px; animation-delay: -7s; }
  .ring-3 { width: 160px; height: 160px; top: 32%; right: 11%; border-color: var(--mauve); opacity: .45; animation-delay: -13s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(8px,-12px) scale(1.02); }
  }

  .logo-wrap { margin-bottom: 28px; animation: fadeUp .85s ease both; }
  .logo-wrap svg { width: 88px; height: 88px; }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(54px, 8vw, 96px);
    font-weight: 400; line-height: 1;
    color: var(--navy); text-align: center;
    animation: fadeUp .85s .1s ease both;
  }
  .hero-title em { font-style: italic; color: var(--mauve); }

  .hero-sub {
    margin-top: 16px; font-size: 13px; font-weight: 300;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--navy); opacity: .55; text-align: center;
    animation: fadeUp .85s .2s ease both;
  }
  .hero-divider {
    width: 48px; height: 1px; background: var(--mauve);
    margin: 30px auto;
    animation: fadeUp .85s .3s ease both;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 32px;
    background: var(--navy); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
    text-decoration: none; border: none; cursor: pointer;
    transition: background .22s, transform .15s;
    animation: fadeUp .85s .4s ease both;
  }
  .hero-cta:hover { background: var(--mauve); transform: translateY(-1px); }
  .hero-cta:hover .cta-arrow { transform: translateY(3px); }
  .cta-arrow { transition: transform .2s; display: inline-block; }

  .scroll-hint {
    position: absolute; bottom: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--navy); opacity: .35;
    animation: fadeUp 1s .65s ease both;
  }
  .scroll-line {
    width: 1px; height: 40px; background: var(--navy); opacity: .35;
    animation: shrink 2s ease infinite;
  }
  @keyframes shrink {
    0%,100%{ height:40px; opacity:.35; }
    50%{ height:18px; opacity:.6; }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* CATALOGUE */
  .catalogue { padding: 80px 48px 120px; max-width: 1280px; margin: 0 auto; }

  .catalogue-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px; padding-bottom: 20px;
    border-bottom: 1px solid var(--navy20);
  }
  .catalogue-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 400;
  }
  .catalogue-count { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; opacity: .45; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; }
  .filter-btn {
    padding: 7px 18px;
    border: 1px solid var(--navy20);
    background: transparent; color: var(--navy);
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    letter-spacing: .07em; text-transform: uppercase;
    cursor: pointer; transition: all .18s;
  }
  .filter-btn:hover { background: var(--navy10); }
  .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

  /* grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
    gap: 2px;
  }

  .product-card {
    background: var(--white); cursor: pointer; position: relative;
    overflow: hidden; border: 1px solid transparent;
    transition: transform .22s ease, border-color .22s;
  }
  .product-card:hover { transform: translateY(-4px); border-color: var(--navy20); }

  .product-img {
    width: 100%; aspect-ratio: 1;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: background .22s;
  }
  .product-card:hover .product-img { background: #F0EBF3; }

  .product-initial {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; font-weight: 400;
    color: var(--navy); opacity: .07;
    transition: opacity .22s, transform .22s;
    user-select: none;
  }
  .product-card:hover .product-initial { opacity: .13; transform: scale(1.06); }

  .cat-dot {
    position: absolute; top: 14px; left: 14px;
    width: 8px; height: 8px; border-radius: 50%;
  }

  .product-body {
    padding: 15px 17px 18px;
    border-top: 1px solid var(--navy10);
  }
  .product-cat {
    font-size: 10px; letter-spacing: .13em; text-transform: uppercase;
    color: var(--mauve); margin-bottom: 4px;
  }
  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; line-height: 1.2;
    color: var(--navy); margin-bottom: 10px;
  }
  .product-foot { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-size: 14px; font-weight: 500; }
  .product-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--navy10); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: background .18s, color .18s, transform .18s;
  }
  .product-card:hover .product-btn {
    background: var(--navy); color: var(--white); transform: rotate(-45deg);
  }

  .empty {
    grid-column: 1/-1; text-align: center; padding: 80px 24px;
    font-family: 'Cormorant Garamond', serif; font-size: 24px; opacity: .35;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--navy20);
    padding: 28px 48px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; opacity: .45; letter-spacing: .04em;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#">Wren <em style="font-style:italic;color:#A188A6">&</em> Co.</a>
  <div class="nav-links">
    <a href="#catalogue">Shop</a>

    <a href="#">About</a>
  </div>
  <button class="nav-cart" title="Cart">🛍</button>
</nav>

<section class="hero">

  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="logo-wrap">
    <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="44" cy="44" r="42" stroke="#01386A" stroke-width="1"/>
      <circle cx="44" cy="44" r="30" stroke="#A188A6" stroke-width=".5"/>
      <path d="M27 53 Q35 29 44 34 Q53 39 59 27 Q57 45 44 47 Q37 48 35 57 Z"
            fill="#01386A" opacity=".9"/>
      <circle cx="57" cy="25" r="3.5" fill="#A188A6"/>
      <path d="M35 57 Q42 62 51 55" stroke="#BEEF9E" stroke-width="1.5"
            stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <h1 class="hero-title">Wren <em>&</em> Co.</h1>
  <p class="hero-sub">Curated home &amp; lifestyle goods</p>
  <div class="hero-divider"></div>

  <a class="hero-cta" href="#catalogue">
    Browse the collection
    <span class="cta-arrow">↓</span>
  </a>

  <div class="scroll-hint">
    Scroll
    <div class="scroll-line"></div>
  </div>
</section>

<section class="catalogue" id="catalogue">
  <div class="catalogue-header">
    <h2 class="catalogue-title">All Products</h2>
    <span class="catalogue-count" id="count-label">80 items</span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</section>

<footer>
  <span>© 2024 Wren &amp; Co.</span>
  <span>Powered by intelligent recommendations</span>
</footer>

};

":7.95},{"sku":"20477","name":"STORAGE BASKET","category":"Home Decor","price":8.75},{"sku":"20279","name":"TABLE RUNNER","category":"Home Decor","price":6.95},{"sku":"20302","name":"WALL HANGING","category":"Home Decor","price":11.0},{"sku":"20932","name":"BAKING MAT","category":"Kitchen","price":6.75},{"sku":"20845","name":"CAKE TIN SET","category":"Kitchen","price":11.25},{"sku":"20647","name":"CERAMIC MUG SET","category":"Kitchen","price":12.95},{"sku":"20771","name":"COLANDER","category":"Kitchen","price":7.95},{"sku":"20498","name":"GLASS STORAGE JAR","category":"Kitchen","price":3.75},{"sku":"20661","name":"KITCHEN TOWEL SET","category":"Kitchen","price":5.25},{"sku":"20695","name":"OVEN MITT PAIR","category":"Kitchen","price":4.5},{"sku":"20732","name":"SALAD BOWL SET","category":"Kitchen","price":16.5},{"sku":"20674","name":"SPICE RACK","category":"Kitchen","price":14.95},{"sku":"20583","name":"WOODEN CUTTING BOARD","category":"Kitchen","price":9.95},{"sku":"22599","name":"ADVENT CALENDAR","category":"Seasonal","price":19.95},{"sku":"23122","name":"AUTUMN WREATH","category":"Seasonal","price":16.95},{"sku":"22804","name":"BIRTHDAY BANNER","category":"Seasonal","price":3.95},{"sku":"22574","name":"CHRISTMAS BAUBLE SET","category":"Seasonal","price":7.95},{"sku":"22677","name":"EASTER EGG BASKET","category":"Seasonal","price":8.75},{"sku":"22657","name":"FAIRY LIGHTS","category":"Seasonal","price":12.5},{"sku":"22757","name":"HALLOWEEN DECORATION","category":"Seasonal","price":6.5},{"sku":"22894","name":"NEW YEAR CONFETTI","category":"Seasonal","price":2.75},{"sku":"23039","name":"SUMMER BUNTING","category":"Seasonal","price":9.25},{"sku":"22983","name":"VALENTINES CARD SET","category":"Seasonal","price":5.5},{"sku":"22050","name":"BOOKMARK SET","category":"Stationery","price":3.5},{"sku":"21886","name":"CALENDAR PLANNER","category":"Stationery","price":9.95},{"sku":"21670","name":"DESK ORGANISER","category":"Stationery","price":11.95},{"sku":"21960","name":" let activeFilter = 'All';

const categories = ['All', ...Object.keys(CAT_COLORS)];
const filtersEl  = document.getElementById('filters');

categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };
  filtersEl.appendChild(btn);
});

function toTitle(str) {
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function renderGrid() {
  const grid   = document.getElementById('grid');
  const label  = document.getElementById('count-label');
  const list   = activeFilter === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeFilter);

  label.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = '<div class="empty">No products found</div>';
    return;
  }

  list.forEach(p => {
    const color = CAT_COLORS[p.category] || '#01386A';
    const card  = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-img">
        <div class="cat-dot" style="background:${color}"></div>
        <span class="product-initial">${p.name[0]}</span>
      </div>
      <div class="product-body">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${toTitle(p.name)}</div>
        <div class="product-foot">
          <span class="product-price">£${p.price.toFixed(2)}</span>
          <span class="product-btn">→</span>
        </div>
      </div>`;
    card.onclick = () => {
      sessionStorage.setItem('selectedProduct', JSON.stringify(p));
      window.location.href = 'product.html';
    };
    grid.appendChild(card);
  });
}

renderGrid();
</script>
</body>
</html>
